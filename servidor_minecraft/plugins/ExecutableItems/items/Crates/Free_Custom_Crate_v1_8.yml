# The name or display name
name: '&7&l(&e&l❖&7&l)>> &7&oEpic box'
# The lore of the item
lore:
- '&f'
- '&8&l»&7&l&m----------------&8&l«'
- '&e     Click to open !'
- '&f'
- '&7&oLoots:'
- '&a   20% &e20 gold ingots'
- '&a   15% &215 emeralds'
- '&a   40% &810 coal'
- '&a   25% &b5 diamonds'
- '&8&l»&7&l&m----------------&8&l«'
- '&f'
# The material
material: CHEST
# Item Glowing effect
glow: false
# Disable item stacking ?
disableStack: false
# Keep the item on death ?
keepItemOnDeath: false
# Can be used only by the owner
# ⚠ Require Store item info on true
canBeUsedOnlyByTheOwner: false
# Store item info ?
# Store the item info like the owner
storeItemInfo: false
# Item unbreakable ?
unbreakable: false
usage: 1
usageLimit: -1
cancelEventIfNoPerm: false
# Cancel event if not owner
cancelEventIfNotOwner: false
disabledWorlds: []
config_5: true
# BlackListed Activators
# (can be used by everyone even if
# the only owner feature is set to true)
onlyOwnerBlackListedActivators: []
# The durability feature
# will be ignored, and the usage
# feature will be used as durability
isDurabilityBasedOnUsage: false
config_update: false
# Disable the enchant glide effect
disableEnchantGlide: false
# Cancel the event if the player has no permission
cancelEventIfNoPermission: false
# The whitelisted worlds features
whitelistedWorlds: []
# Keep the default attributes
# Only for 1.19+
keepDefaultAttributes: false
# For new item LET IT FALSE PLS
# Otherwise you can let it true
# if you want to update your old items turn it FALSE
# But be careful the item tags may change
# it can impact shopkeeper or custom craft recipe
# Only for 1.19+
ignoreKeepDefaultAttributesFeature: true
# The usage features
# Increase or Decrease this usage with
# UsageModification in your activators
usageFeatures:
  # The usage of the item
  # -1 = Infinite
  # Increase or Decrease this usage with
  # UsageModification in your activators
  usage: 1
  # Is refreshable clean
  isRefreshableClean: true
  # The usage limit of the item
  # Usage can't be increased above this value
  usageLimit: -1
# The drop features
dropFeatures:
  # Glow drop
  glowDrop: false
  # The color of the glow
  glowDropColor: WHITE
  # Display custom name above the item
  displayNameDrop: false
# The enchantments of the item
enchantments: {}
# The hiders features
# Hiders to hide:
# Attributes, Enchants, ...
hiders:
  # Hide enchantments
  hideEnchantments: false
  # Hide unbreakable
  hideUnbreakable: false
  # Hide attributes
  hideAttributes: false
  # Hide usage
  hideUsage: false
  # Hide destroys
  hideDestroys: false
  # Hide placed on
  hidePlacedOn: false
  # Hide dye
  hideDye: false
  # Hides armor trim details in
  # armor. Does not hide armor
  # trim item details
  hideArmorTrim: false
  # Hide additional tooltip
  # This option can no longer hide
  # armor trim item details in 1.21.5+
  hideAdditionalTooltip: false
  # Hide tool tip
  hideToolTip: false
# The give first join features
giveFirstJoinFeatures:
  # Enable the feature
  giveFirstJoin: false
  # The amount to give
  giveFirstJoinAmount: 1
  # Slot between 0 and 8 includes
  giveFirstJoinSlot: 0
# The restrictions features
restrictions:
  # Cancel the placement of the item
  cancel-item-place: true
  # The item can't be
  # moved of the inventory
  locked-in-inventory: false
# The variables
# Variables are used to store data like kills / deaths ...
variables: {}
# The activators / triggers
activators:
  activator1:
    # The name or display name
    name: '&eActivator'
    option: PLAYER_ALL_CLICK
    typeTarget: NO_TYPE_TARGET
    # Usage modification
    usageModification: -1
    # Cancel the vanilla event
    cancelEvent: false
    # If another plugin cancels the event that
    # triggers the activator and you enabled this feature
    # the activator will not be activated
    noActivatorRunIfTheEventIsCancelled: false
    # Silence the output of the command
    # (Only in the console)
    silenceOutput: true
    # Automatically update the item
    autoUpdateItem: false
    # The cooldown
    cooldownFeatures:
      # The cooldown
      cooldown: 0
      # The placeholders conditions to pause the cooldown
      pausePlaceholdersConditions: {}
    # The global cooldown
    # (For ALL players and entities)
    globalCooldownFeatures:
      # The cooldown
      cooldown: 0
    # To add cooldown
    # to another EI
    otherEICooldowns: {}
    # The required items
    requiredItems: {}
    # The required executable items
    requiredExecutableItems: {}
    # The required Magics
    # (from EcoSkills)
    requiredMagics: {}
    # The slots where the
    # activator will work
    detailedSlots:
    - -1
    playerCommands:
    - SENDMESSAGE You have executed %item%
    - execute at %player% run playsound minecraft:entity.firework_rocket.launch voice
      %player%
    - title %player% times 0 60 0
    - title %player% title {"text":"&e&l\"You have executed"}
    - title %player% subtitle {"text":"&e&lMoney Pouch - Tier I"}
    - DELAY 2
    - title %player% title {"text":"&c&lRolling"}
    - title %player% subtitle {"text":"&2&l$ &k&l2 3 4 5 6 7"}
    - execute at %player% run playsound minecraft:entity.experience_orb.pickup voice
      %player%
    - 'LOOP START: 30'
    - DELAYTICK 2
    - execute at %player% run playsound minecraft:block.note_block.bass ambient %player%
    - LOOP END
    - 'RANDOM RUN: 1'
    - 'LOOP START: 20'
    - title %player% times 0 60 0 +++ title %player% title {"text":"20 GOLD INGOTS
      ","color":"gold"}+++ title %player% subtitle {"text":""} +++ execute at %player%
      run playsound minecraft:entity.villager.yes voice %player% +++ give %player%
      gold_ingot 20
    - LOOP END
    - 'LOOP START: 15'
    - title %player% times 0 60 0 +++ title %player% title {"text":"15 EMERALDS ","color":"green"}+++
      title %player% subtitle {"text":""} +++ execute at %player% run playsound minecraft:entity.villager.yes
      voice %player% +++ give %player% emerald 15
    - LOOP END
    - 'LOOP START: 40'
    - title %player% times 0 60 0 +++ title %player% title {"text":"10 COAL ","color":"gray"}+++
      title %player% subtitle {"text":""} +++ execute at %player% run playsound minecraft:entity.villager.no
      voice %player% +++ give %player% coal 10
    - LOOP END
    - 'LOOP START: 25'
    - title %player% times 0 60 0 +++ title %player% title {"text":"5 DIAMONDS ","color":"blue"}+++
      title %player% subtitle {"text":""} +++ execute at %player% run playsound minecraft:entity.villager.yes
      voice %player% +++ give %player% diamond 5
    - LOOP END
    - RANDOM END
    # Add player conditions to determine
    # when the 
    playerConditions: {}
    #
    worldConditions: {}
    #
    itemConditions: {}
    #
    customConditions: {}
    # The placeholders conditions
    placeholdersConditions: {}
    # Part to modifiy your variables
    variablesModification: {}
# Display conditions in the lore
displayConditions:
  # Add player conditions to determine
  # when the 
  playerConditions: {}
  #
  worldConditions: {}
  #
  itemConditions: {}
  # The placeholders conditions
  placeholdersConditions: {}
  # Enable or disable this feature
  enableFeature: false
# Food features
foodFeatures:
  # Is the food meat?
  isMeat: false
  # The nutrition of the food
  nutrition: 0
  # The saturation of the food
  saturation: 0
  # Can the player always eat this food?
  canAlwaysEat: false
  # The time in seconds to eat the food
  eatSeconds: 0
containerFeatures:
  # Is the container locked?
  isLocked: false
  # The container content
  containerContent: []
# The rarity of the item
itemRarity:
  # Enable or disable the rarity feature
  enableRarity: false
  # The rarity of the item
  rarity: COMMON
# The attributes
attributes: {}