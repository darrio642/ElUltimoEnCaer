# The name or display name
name: '&3☁ &b&lFly &3☁'
# The lore of the item
lore:
- '&8&m------------------------'
- '&7'
- '&3➤ &b&oClick to execute me !'
- '&7'
- '&7&oInfo:'
- '&3» &a10 min &bof FLY'
- '&7'
- '&8&m------------------------'
# The material
material: FEATHER
# Item Glowing effect
glow: true
# Disable item stacking ?
disableStack: false
# Keep the item on death ?
keepItemOnDeath: false
# Can be used only by the owner
# ⚠ Require Store item info on true
canBeUsedOnlyByTheOwner: false
# Store item info ?
# Store the item info like the owner
storeItemInfo: false
# Item unbreakable ?
unbreakable: false
usage: 3
usageLimit: -1
cancelEventIfNoPerm: false
# Cancel event if not owner
cancelEventIfNotOwner: false
disabledWorlds: []
config_5: true
config_update: false
# Disable the enchant glide effect
disableEnchantGlide: false
# BlackListed Activators
# (can be used by everyone even if
# the only owner feature is set to true)
onlyOwnerBlackListedActivators: []
# The usage features
# Increase or Decrease this usage with
# UsageModification in your activators
usageFeatures:
  # The usage of the item
  # -1 = Infinite
  # Increase or Decrease this usage with
  # UsageModification in your activators
  usage: 3
  # Is refreshable clean
  isRefreshableClean: true
  # The usage limit of the item
  # Usage can't be increased above this value
  usageLimit: -1
# The durability feature
# will be ignored, and the usage
# feature will be used as durability
isDurabilityBasedOnUsage: false
# The drop features
dropFeatures:
  # Glow drop
  glowDrop: false
  # The color of the glow
  glowDropColor: WHITE
  # Display custom name above the item
  displayNameDrop: false
# The enchantments of the item
enchantments: {}
# The hiders features
# Hiders to hide:
# Attributes, Enchants, ...
hiders:
  # Hide enchantments
  hideEnchantments: false
  # Hide unbreakable
  hideUnbreakable: false
  # Hide attributes
  hideAttributes: false
  # Hide usage
  hideUsage: false
  # Hide destroys
  hideDestroys: false
  # Hide placed on
  hidePlacedOn: false
  # Hide dye
  hideDye: false
  # Hides armor trim details in
  # armor. Does not hide armor
  # trim item details
  hideArmorTrim: false
  # Hide additional tooltip
  # This option can no longer hide
  # armor trim item details in 1.21.5+
  hideAdditionalTooltip: false
  # Hide tool tip
  hideToolTip: false
# The give first join features
giveFirstJoinFeatures:
  # Enable the feature
  giveFirstJoin: false
  # The amount to give
  giveFirstJoinAmount: 1
  # Slot between 0 and 8 includes
  giveFirstJoinSlot: 0
# The restrictions features
restrictions:
  # Cancel the drop of the item
  cancel-item-drop: true
  # The item can't be
  # moved of the inventory
  locked-in-inventory: false
# Cancel the event if the player has no permission
cancelEventIfNoPermission: false
# The whitelisted worlds features
whitelistedWorlds: []
# The variables
# Variables are used to store data like kills / deaths ...
variables: {}
# The activators / triggers
activators:
  activator1:
    # The name or display name
    name: '&eActivator'
    option: PLAYER_ALL_CLICK
    typeTarget: NO_TYPE_TARGET
    # Usage modification
    usageModification: -1
    # Cancel the vanilla event
    cancelEvent: false
    # If another plugin cancels the event that
    # triggers the activator and you enabled this feature
    # the activator will not be activated
    noActivatorRunIfTheEventIsCancelled: false
    # Silence the output of the command
    # (Only in the console)
    silenceOutput: true
    # Automatically update the item
    autoUpdateItem: false
    # The cooldown
    cooldownFeatures:
      # The cooldown
      cooldown: 600
      # The placeholders conditions to pause the cooldown
      pausePlaceholdersConditions: {}
    # The global cooldown
    # (For ALL players and entities)
    globalCooldownFeatures:
      # The cooldown
      cooldown: 0
    # To add cooldown
    # to another EI
    otherEICooldowns: {}
    # The required items
    requiredItems: {}
    # The required executable items
    requiredExecutableItems: {}
    # The required Magics
    # (from EcoSkills)
    requiredMagics: {}
    # The slots where the
    # activator will work
    detailedSlots:
    - -1
    - 40
    playerCommands:
    - FLY ON
    - ACTIONBAR ON
    - 'LOOP START: 10'
    - execute at %player% run playsound minecraft:item.armor.equip_leather master
      @a
    - PARTICLE DRAGON_BREATH 500 3 0.2
    - DELAYTICK 2
    - LOOP END
    - SENDMESSAGE §a§l[ExecutableItems] §eYou can fly !
    - DELAY 570
    - SENDMESSAGE §a§l[ExecutableItems] §eYour fly will be disable in 30 sec
    - DELAY 30
    - FLY OFF
    - ACTIONBAR OFF
    - PARTICLE DRAGON_BREATH 500 3 0.2
    # Add player conditions to determine
    # when the 
    playerConditions: {}
    #
    worldConditions: {}
    #
    itemConditions: {}
    #
    customConditions: {}
    # The placeholders conditions
    placeholdersConditions: {}
    # Part to modifiy your variables
    variablesModification: {}
# Display conditions in the lore
displayConditions:
  # Add player conditions to determine
  # when the 
  playerConditions: {}
  #
  worldConditions: {}
  #
  itemConditions: {}
  # The placeholders conditions
  placeholdersConditions: {}
  # Enable or disable this feature
  enableFeature: false
# Food features
foodFeatures:
  # Is the food meat?
  isMeat: false
  # The nutrition of the food
  nutrition: 1
  # The saturation of the food
  saturation: 1
  # Can the player always eat this food?
  canAlwaysEat: false
  # The time in seconds to eat the food
  eatSeconds: 1
# The rarity of the item
itemRarity:
  # Enable or disable the rarity feature
  enableRarity: false
  # The rarity of the item
  rarity: COMMON
# The attributes
attributes:
  attribute1:
    attribute: GENERIC_MOVEMENT_SPEED
    operation: ADD_NUMBER
    amount: 0.5
    # The slot
    slot: HAND
    # The name or display name
    name: '&eDefault name'
    uuid: 91bed46e-0715-49ef-8c84-3915707c4314
# Keep the default attributes
# Only for 1.19+
keepDefaultAttributes: false
# For new item LET IT FALSE PLS
# Otherwise you can let it true
# if you want to update your old items turn it FALSE
# But be careful the item tags may change
# it can impact shopkeeper or custom craft recipe
# Only for 1.19+
ignoreKeepDefaultAttributesFeature: true